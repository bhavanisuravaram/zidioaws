{% extends "base.html" %}
{% block title %}Login - Zidio Connect{% endblock %}
{% block content %}

<div class="form-page narrow">
  <div class="form-header">
    <h1>Welcome Back</h1>
    <p>Log in to your Zidio Connect account</p>
  </div>

  <form class="styled-form" action="/login" method="POST">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" name="email" placeholder="you@email.com" required autofocus/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Your password" required/>
    </div>
    <button type="submit" class="btn-primary large full-width">Login →</button>
    <p class="form-footer-text">Don't have an account? <a href="/register">Register here</a></p>
  </form>

  <div class="demo-accounts">
    <p><strong>Demo accounts</strong></p>
    <code>student@zidio.in / password123</code><br>
    <code>recruiter@zidio.in / password123</code>
  </div>
</div>

{% endblock %}
