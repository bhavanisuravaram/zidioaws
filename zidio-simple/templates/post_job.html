{% extends "base.html" %}
{% block title %}Post a Job - Zidio Connect{% endblock %}
{% block content %}

<div class="form-page">
  <div class="form-header">
    <h1>Post a Job</h1>
    <p>Reach thousands of qualified candidates across India</p>
  </div>
  <form class="styled-form" action="/post-job" method="POST">
    <div class="form-section">
      <h3>Job Information</h3>
      <div class="form-row">
        <div class="form-group">
          <label>Job Title *</label>
          <input type="text" name="title" placeholder="e.g. Senior Python Developer" required/>
        </div>
        <div class="form-group">
          <label>Company Name *</label>
          <input type="text" name="company" value="{{ current_user.company }}" placeholder="Your company name" required/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Location *</label>
          <input type="text" name="location" placeholder="e.g. Hyderabad / Remote" required/>
        </div>
        <div class="form-group">
          <label>Salary Range</label>
          <input type="text" name="salary" placeholder="e.g. 8-12 LPA"/>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Job Type *</label>
          <select name="job_type" required>
            <option value="">Select type</option>
            <option>Full-time</option>
            <option>Part-time</option>
            <option>Contract</option>
            <option>Internship</option>
            <option>Remote</option>
          </select>
        </div>
        <div class="form-group">
          <label>Category *</label>
          <select name="category" required>
            <option value="">Select category</option>
            {% for cat in ['Technology','Design','Marketing','Finance','Healthcare','Education','Sales','Operations'] %}
            <option>{{ cat }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
    </div>
    <div class="form-section">
      <h3>Job Details</h3>
      <div class="form-group">
        <label>Job Description *</label>
        <textarea name="description" rows="6" placeholder="Describe the role and responsibilities..." required></textarea>
      </div>
      <div class="form-group">
        <label>Requirements *</label>
        <textarea name="requirements" rows="4" placeholder="Skills and qualifications needed..." required></textarea>
      </div>
    </div>
    <button type="submit" class="btn-primary large">Post Job →</button>
  </form>
</div>

{% endblock %}
