<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Zidio Connect{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav class="navbar">
  <a href="/" class="brand">
    <span class="brand-z">Z</span>idio<span class="brand-dot">.</span>Connect
  </a>
  <div class="nav-links">
    <a href="/jobs">Browse Jobs</a>
    <a href="/post-job" class="btn-nav">Post a Job</a>
    <a href="/dashboard">Dashboard</a>
  </div>
</nav>

<div class="flash-container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
      <div class="flash flash-{{ category }}">{{ message }}</div>
    {% endfor %}
  {% endwith %}
</div>

{% block content %}{% endblock %}

<footer class="footer">
  <div class="footer-inner">
    <span class="brand-z">Z</span>idio<span class="brand-dot">.</span>Connect &mdash; Powered by AWS
    <span class="footer-pills">
      <span>EC2</span><span>DynamoDB</span><span>SNS</span><span>IAM</span>
    </span>
  </div>
</footer>

</body>
</html>
